<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet"
/>
<link
    id="stoicswe-dark-css"
    rel="stylesheet"
    href="{{ '/assets/css/dark.css' | relative_url }}"
    media="(prefers-color-scheme: dark)"
/>
<script>
    /* Apply saved theme + accent preference before paint to avoid a flash. */
    (function () {
        try {
            var t = localStorage.getItem("stoicswe-theme");
            if (t === "dark" || t === "light") {
                var l = document.getElementById("stoicswe-dark-css");
                if (l) l.media = t === "dark" ? "all" : "not all";
            }
        } catch (e) {}
        try {
            var wallpapers = {
                snow:         "ahmetyuksek-snow-covered-peaks-9771614_1920.jpg",
                bokeh:        "anrita1705-bokeh-4578758_1920.jpg",
                coffee:       "clickerhappy-coffee-beans-917613_1920.jpg",
                spring:       "gimgyeongbog-spring-5016266_1920.jpg",
                dahlia:       "heikiwi-dahlia-8209085_1920.jpg",
                leaves:       "mylene2401-leaves-8390274_1920.jpg",
                aster:        "nennieinszweidrei-high-mock-aster-8380794_1920.jpg",
                flower:       "rattakarn-flower-7861942_1920.jpg",
                abstract:     "steve_a_johnson-wallpaper-8857295_1920.jpg",
                pasqueflower: "susannp4-pasqueflower-3066824_1920.jpg",
                reed:         "terbe_rezso-reed-9540853_1920.jpg",
                jellyfish:    "tyna_janoch-jellyfish-7704800_1920.jpg"
            };
            var w = localStorage.getItem("stoicswe-wallpaper");
            var f = w && wallpapers[w];
            if (f) {
                var hs = document.documentElement.style;
                hs.setProperty("background-image", "url('/assets/images/wallpapers/" + f + "')", "important");
                hs.setProperty("background-size", "cover", "important");
                hs.setProperty("background-position", "center center", "important");
                hs.setProperty("background-repeat", "no-repeat", "important");
                hs.setProperty("background-attachment", "fixed", "important");
            }
        } catch (e) {}
        try {
            var palette = {
                blue:     "#0a84ff",
                purple:   "#bf5af2",
                pink:     "#ff375f",
                red:      "#ff3b30",
                orange:   "#ff9f0a",
                yellow:   "#ffd60a",
                green:    "#30d158",
                graphite: "#8e8e93"
            };
            var a = localStorage.getItem("stoicswe-accent");
            var hex = a && palette[a];
            if (hex) {
                var n = parseInt(hex.slice(1), 16);
                var r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
                var lr = Math.round(r + (255 - r) * 0.18);
                var lg = Math.round(g + (255 - g) * 0.18);
                var lb = Math.round(b + (255 - b) * 0.18);
                var hover = "#" + ((1 << 24) + (lr << 16) + (lg << 8) + lb).toString(16).slice(1);
                var s = document.documentElement.style;
                s.setProperty("--sonoma-accent", hex);
                s.setProperty("--sonoma-accent-hover", hover);
                s.setProperty("--sonoma-accent-tint", "rgba(" + r + "," + g + "," + b + ",0.18)");
                s.setProperty("--sonoma-selection", "rgba(" + r + "," + g + "," + b + ",0.30)");
            }
        } catch (e) {}
    })();
</script>
